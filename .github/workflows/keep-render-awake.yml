name: Keep Render Service Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate health URL secret
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$RENDER_HEALTH_URL" ]; then
            echo "RENDER_HEALTH_URL secret is missing."
            echo "Set it to your Render backend health endpoint, e.g. https://your-service.onrender.com/api/v1"
            exit 1
          fi

      - name: Ping Render health endpoint
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          curl --fail --silent --show-error \
            --connect-timeout 10 \
            --max-time 20 \
            --retry 2 \
            --retry-delay 2 \
            "$RENDER_HEALTH_URL"

      - name: Log keep alive event
        run: echo "Render keep-alive ping sent at $(date -u)."
